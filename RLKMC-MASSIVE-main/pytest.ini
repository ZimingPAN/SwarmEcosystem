[pytest]
# Keep test discovery scoped to the repository's test suite.
testpaths =
    tests

# Make local imports (e.g. `import RL4KMC`) work regardless of pytest import mode.
pythonpath =
    .

# Prevent pytest from walking large runtime output trees.
norecursedirs =
    output
    tmp
    .git
    .venv
    venv
    build
    dist
